schema_version = 2
run_id = "m8-final-v0-1-002"

[protocol]
benchmark_version = "0.1"
level_id = 1
backend = "mjx_warp"
test_track_count = 20
controller_order = ["pid", "mpc", "ppo"]
reset_seed_rule = "test_row_index_uint32_reused_for_each_controller"
controller_seed_rule = "numpy_seedsequence_root_reset_seed_world_0_episode_0_domain_1"
track_order_rule = "official_test_manifest_rows_0_through_19"
controller_execution_model = "ordinary_controller_plugin_runner"
environment_lifecycle = "one_shared_batch_one_environment_all_60_episodes"
max_episode_steps = 4000
environment_instances = 1
fresh_controller_per_episode = true
fresh_controller_instance_count = 60
same_track_and_reset_seed_for_each_controller = true
controller_frequency_hz = 20
compute_deadline_s = 0.05
controller_init_soft_limit_s = 30.0
realtime_p99_limit_s = 0.05
realtime_miss_rate_limit = 0.01
realtime_qualification_required_for_pass = false
controller_exception_policy = "invalidate_attempt_preserve_sanitized_evidence_no_automatic_retry"
controller_init_limit_exceeded_policy = "record_soft_diagnostic_and_continue"
ranking_rule = "success_rate_desc_then_mean_successful_lap_time_asc"
test_informed_tuning_allowed = false
success_rate_pass_gate = false

[metrics]
projection_backward_segments = 4
projection_forward_segments = 12
speed_sample = "post_step_body_velocity_norm"
lateral_error_sample = "post_step_topology_local_centerline_projection"
saturation_sample = "requested_action_strictly_outside_physical_bounds"
smoothness_sample = "successive_requested_action_delta_per_second_excluding_first_action"
aggregate_weighting = "transition_weighted"
control_dt_s = 0.05
steering_lower_rad = -0.6
steering_upper_rad = 0.6
longitudinal_lower_mps2 = -8.0
longitudinal_upper_mps2 = 4.0

[replay]
test_row_index = 0
capture_method = "record_all_canonical_episodes_retain_predeclared_row_zero"
replay_environment_instances = 0

[retry]
accepted_result = "first_complete_protocol_passing_replacement_attempt"
automatic_retry_after_test_bound = false
performance_outcome_can_trigger_retry = false
completed_workload_can_only_finalize_from_durable_journal_and_execution_evidence = true

[replacement]
authorized = true
replacement_of_run_id = "m8-final-v0-1-001"
replacement_attempt_limit = 1
eligibility_rule = "predecessor_test_bound_zero_journal_null_execution_evidence_only_canonical_environment_create_workload_null_failure_no_outputs_seal_or_staged_artifacts"
failure_report_path = "benchmarks/v0.1/m8_attempt_001_failure_report.json"
failure_report_sha256 = "60bdb6d038b27867b13e1a12455b46e6717d1840bff65f1e072de06692645235"
